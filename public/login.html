<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Satria-API</title>
    <link rel="icon" href="/assets/icon.png" type="image/jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar{display:none!important}
        body{position:relative;scroll-behavior:smooth;background-color:#fff;font-family:'Space Grotesk',system-ui,sans-serif}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
        .form-input{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:11px 14px 11px 40px;font-size:14px;color:#1f2937;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Space Grotesk',sans-serif}
        .form-input:focus{border-color:#9ca3af;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
        .form-input::placeholder{color:#9ca3af}
        .btn-primary{width:100%;background:#1f2937;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;font-family:'Space Grotesk',sans-serif;letter-spacing:.025em}
        .btn-primary:hover{background:#374151}
        .divider{display:flex;align-items:center;gap:12px;margin:20px 0}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
        .divider span{font-size:12px;color:#9ca3af}
        .social-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px;font-size:13px;font-weight:500;color:#374151;background:#fff;cursor:pointer;transition:border-color .2s,background .2s;font-family:'Space Grotesk',sans-serif}
        .social-btn:hover{background:#f9fafb;border-color:#d1d5db}
        .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:32px;box-shadow:0 4px 24px -8px rgba(0,0,0,.08)}
        .tab-btn{flex:1;padding:8px;font-size:13px;font-weight:600;border-radius:8px;transition:all .2s;cursor:pointer;border:none;background:transparent;font-family:'Space Grotesk',sans-serif}
        .tab-btn.active{background:#1f2937;color:#fff}
        .tab-btn:not(.active){color:#6b7280}
        .tab-btn:not(.active):hover{color:#374151}
        .toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#9ca3af;cursor:pointer;font-size:14px;transition:color .2s}
        .toggle-pass:hover{color:#374151}
    </style>
<link rel="stylesheet" href="/style.css">
</head>
<body class="bg-white text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center px-4 py-10">

    <!-- Logo -->
    <div class="mb-8 text-center" data-aos="fade-down" data-aos-duration="700">
        <a href="/" class="inline-flex items-center gap-2">
            <img src="/assets/icon.png" class="w-8 h-8 rounded-lg object-cover">
            <span class="font-bold text-gray-800 text-lg tracking-tight">Satria-API</span>
        </a>
    </div>

    <!-- Card -->
    <div class="card w-full max-w-sm" data-aos="fade-up" data-aos-duration="800">

        <!-- Tabs -->
        <div class="flex bg-gray-100 rounded-10 p-1 mb-6 rounded-lg">
            <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button id="tab-register" class="tab-btn" onclick="switchTab('register')">Daftar</button>
        </div>

        <!-- Login Form -->
        <div id="form-login">
            <h2 class="text-lg font-bold text-gray-800 mb-1">Selamat datang kembali</h2>
            <p class="text-sm text-gray-500 mb-6">Masuk ke akun Satria-API Anda</p>

            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Email</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="email" class="form-input" placeholder="nama@email.com" required>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-xs font-semibold text-gray-600">Password</label>
                        <a href="#" class="text-xs text-gray-400 hover:text-gray-700 transition-colors">Lupa password?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-regular fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" id="login-pass" class="form-input" placeholder="••••••••" required>
                        <span class="toggle-pass" onclick="togglePassword('login-pass',this)"><i class="fa-regular fa-eye"></i></span>
                    </div>
                </div>
                <button type="submit" class="btn-primary mt-2">Masuk</button>
            </form>

            <div class="divider"><span>atau lanjutkan dengan</span></div>

            <div class="grid grid-cols-2 gap-3">
                <button class="social-btn">
                    <i class="fab fa-google text-sm"></i>
                    <span>Google</span>
                </button>
                <button class="social-btn">
                    <i class="fab fa-github text-sm"></i>
                    <span>GitHub</span>
                </button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="form-register" class="hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-1">Buat akun baru</h2>
            <p class="text-sm text-gray-500 mb-6">Daftar dan mulai gunakan Satria-API</p>

            <form onsubmit="handleRegister(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Nama Lengkap</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" class="form-input" placeholder="Nama kamu" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Email</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="email" class="form-input" placeholder="nama@email.com" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fa-regular fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" id="reg-pass" class="form-input" placeholder="Min. 8 karakter" required minlength="8">
                        <span class="toggle-pass" onclick="togglePassword('reg-pass',this)"><i class="fa-regular fa-eye"></i></span>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Konfirmasi Password</label>
                    <div class="relative">
                        <i class="fa-regular fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" id="reg-pass2" class="form-input" placeholder="Ulangi password" required>
                        <span class="toggle-pass" onclick="togglePassword('reg-pass2',this)"><i class="fa-regular fa-eye"></i></span>
                    </div>
                </div>
                <div class="flex items-start gap-2 pt-1">
                    <input type="checkbox" id="agree" class="mt-0.5 accent-gray-800" required>
                    <label for="agree" class="text-xs text-gray-500">Saya menyetujui <a href="#" class="underline hover:text-gray-800">syarat & ketentuan</a> yang berlaku</label>
                </div>
                <button type="submit" class="btn-primary">Buat Akun</button>
            </form>

            <div class="divider"><span>atau daftar dengan</span></div>

            <div class="grid grid-cols-2 gap-3">
                <button class="social-btn">
                    <i class="fab fa-google text-sm"></i>
                    <span>Google</span>
                </button>
                <button class="social-btn">
                    <i class="fab fa-github text-sm"></i>
                    <span>GitHub</span>
                </button>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="hidden mt-4 px-4 py-3 rounded-10 text-sm font-medium text-center rounded-lg transition-all"></div>
    </div>

    <p class="mt-6 text-xs text-gray-400">© 2025 Satriadevs</p>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({duration:800,easing:'ease-out-cubic',once:true});

    function switchTab(tab){
        const isLogin = tab==='login';
        document.getElementById('form-login').classList.toggle('hidden',!isLogin);
        document.getElementById('form-register').classList.toggle('hidden',isLogin);
        document.getElementById('tab-login').classList.toggle('active',isLogin);
        document.getElementById('tab-register').classList.toggle('active',!isLogin);
        document.getElementById('toast').classList.add('hidden');
    }

    function togglePassword(id,el){
        const inp=document.getElementById(id);
        const showing=inp.type==='password';
        inp.type=showing?'text':'password';
        el.innerHTML=showing?'<i class="fa-regular fa-eye-slash"></i>':'<i class="fa-regular fa-eye"></i>';
    }

    function showToast(msg,type){
        const t=document.getElementById('toast');
        t.textContent=msg;
        t.className=`mt-4 px-4 py-3 rounded-lg text-sm font-medium text-center ${type==='success'?'bg-green-50 text-green-700 border border-green-200':'bg-red-50 text-red-700 border border-red-200'}`;
        t.classList.remove('hidden');
        setTimeout(()=>t.classList.add('hidden'),4000);
    }

    function handleLogin(e){
        e.preventDefault();
        // Hook your login API here
        showToast('Login berhasil! Mengalihkan...','success');
        setTimeout(()=>window.location.href='/',1500);
    }

    function handleRegister(e){
        e.preventDefault();
        const p1=document.getElementById('reg-pass').value;
        const p2=document.getElementById('reg-pass2').value;
        if(p1!==p2){showToast('Password tidak cocok.','error');return;}
        // Hook your register API here
        showToast('Akun berhasil dibuat! Silakan login.','success');
        setTimeout(()=>switchTab('login'),1800);
    }
</script>
<script src="/app.js"></script>
</body>
</html>
